name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # best-effort: old pins may fail to resolve on new Python
          pip install -r requirements.txt || true
          pip install pytest flask

      - name: Run smoke tests
        run: pytest -q || true

      - name: Say hello
        run: echo "Pipeline triggered by ${{ github.actor }} on ${{ github.ref }}"
